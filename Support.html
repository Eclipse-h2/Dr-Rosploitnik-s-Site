<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dr Rosploitnik</title>
    <link rel="icon" type="image/x-icon" href="android-chrome-512x512.png">
    <link rel="stylesheet" href="style.css">
    <script defer src="activePage.js"></script>
</head>
<body>
    <nav class="navbar">
            <div class="logo">DR ROSPLOITNIK</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="images.html">Images</a></li>
                <li><a href="download.html">Downloads</a></li>
                <li><a href="Support.html">Support</a></li>
            </ul>
        </nav>


      <div class="support-container">
  <h2>Contact Us</h2>
  <p class="support-subtitle">Have a question or found a bug? Submit a ticket and our team will get back to you via email.</p>
  
  <form class="support-form">
    <div class="form-group">
      <label for="name">Name *</label>
      <input type="text" id="name" required placeholder="Your name">
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" required placeholder="Your email address">
    </div>

    <div class="form-group">
      <label for="message">How can we help? *</label>
      <textarea id="message" rows="5" required placeholder="Describe your issue or request..."></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit Ticket</button>
  </form>
  <div id="success-message" style="display: none; color: #10b981; text-align: center; margin-top: 20px; font-weight: 500;">
  ✔ Ticket submitted successfully! We'll be in touch soon.
</div>
</div>
    </main>
    <script>
  document.querySelector('.support-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Prevents the page from refreshing
    
    // Hide the form
    this.style.display = 'none';
    
    // Show the success message
    document.getElementById('success-message').style.display = 'block';
    
  });
</script>
<script>
  document.querySelector('.support-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Prevents the page from refreshing

    // 1. Grab the values the user typed into the form
    const userName = document.getElementById('name').value;
    const userEmail = document.getElementById('email').value;
    const userMessage = document.getElementById('message').value;

    // 2. Your Discord Webhook URL (Paste yours here)
    const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE';

    // 3. Format the data into a clean Discord Embed card
    const discordPayload = {
      embeds: [{
        title: "📩 New Support Ticket Submitted",
        color: 3447003, // A clean blue accent color bar
        fields: [
          { name: "👤 Name", value: userName, inline: true },
          { name: "📧 Email", value: userEmail, inline: true },
          { name: "💬 Message", value: userMessage, inline: false }
        ],
        timestamp: new Date().toISOString(),
        footer: { text: "Dr Rosploitnik Support System" }
      }]
    };

    // 4. Send the data to Discord
    fetch(webhookUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(discordPayload)
    })
    .then(response => {
      if (response.ok) {
        // Hide the form on success
        document.querySelector('.support-form').style.display = 'none';
        // Show the success message
        document.getElementById('success-message').style.display = 'block';
      } else {
        alert("Something went wrong. Please try submitting again.");
      }
    })
    .catch(error => {
      console.error('Error sending to Discord:', error);
      alert("Network error. Please try again later.");
    });
  });
</script>
</body>
</html>
